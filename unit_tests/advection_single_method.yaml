# Linear advection single-method test: no-sharpening baseline vs ONE method.
# Swap sharpening_method on alpha_test to iterate through methods.
# CFL = 0.5, 10 revolutions, sharp IC (eps_initial = 4*dx).

domain:
  x_min: -0.05
  x_max: 0.05
  n_points: 2000

time:
  dt: 2.5e-5
  n_steps: 40000

velocity:
  type: constant
  value: [1.0]

fields:
  - name: alpha_no_sharp
    initial_condition: "0.5 * (tanh((0.025 + x) / 4e-4) + tanh((0.025 - x) / 4e-4))"
    boundary: { type: periodic }
    sharpening: false

  - name: alpha_test
    initial_condition: "0.5 * (tanh((0.025 + x) / 4e-4) + tanh((0.025 - x) / 4e-4))"
    boundary: { type: periodic }
    sharpening: true
    sharpening_method: lpm

solver:
  type: upwind

sharpening:
  enabled: false
  method: pm_cal
  eps_target: 2.0e-4
  strength: 7.4989
  n_substeps: 10

output:
  monitors:
    - type: console

    - type: metrics
      every_n_steps: 100
      interface_radius: 0.025
      advection_velocity: 1.0
      fields:
        - alpha_no_sharp
        - alpha_test

    - type: gif
      every_n_steps: 500
      compare_fields:
        - { field: alpha_no_sharp, color: black, linestyle: "--" }
        - { field: alpha_test,     color: red,   linestyle: "-"  }
