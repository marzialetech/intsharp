# Duplicate of tanh_circle_10_rev_compare with identical physics and monitors,
# plus txt snapshots for Bayesian postprocessing of alpha_no_sharp.

domain:
  x_min: -0.5
  x_max: 0.5
  n_points_x: 100
  y_min: -0.5
  y_max: 0.5
  n_points_y: 100

time:
  dt: 0.01
  n_steps: 2000

velocity:
  type: constant
  value: [0.5, 0.0]

fields:
  - name: alpha_no_sharp
    initial_condition: "0.5 * (1 + tanh((0.15 - r) / 0.02))"
    boundary:
      type: periodic
    sharpening: false

  - name: alpha_pm
    initial_condition: "0.5 * (1 + tanh((0.15 - r) / 0.02))"
    boundary:
      type: periodic
    sharpening: true

solver:
  type: upwind

sharpening:
  enabled: false
  method: pm
  eps_target: 0.02
  strength: 1.0

output:
  monitors:
    - type: console
    - type: gif
      every_n_steps: 20
      compare_fields:
        - field: alpha_no_sharp
          contour_levels: [0.5]
          color: blue
          linestyle: "-"
        - field: alpha_pm
          contour_levels: [0.5]
          color: red
          linestyle: "--"
    - type: gif
      every_n_steps: 20
      field: alpha_no_sharp
    - type: gif
      every_n_steps: 20
      field: alpha_pm
    - type: txt
      every_n_steps: 20
      fields: [alpha_no_sharp, alpha_pm]
