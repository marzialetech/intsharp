# 2D comparison: new AI-proposed methods (VCAC, GLCLS) vs PM and CL.
# Circle advection, 10 revolutions with periodic BC.

domain:
  x_min: -0.5
  x_max: 0.5
  n_points_x: 100
  y_min: -0.5
  y_max: 0.5
  n_points_y: 100

time:
  dt: 0.01
  n_steps: 2000

velocity:
  type: constant
  value: [0.5, 0.0]

fields:
  - name: alpha_no_sharp
    initial_condition: "0.5 * (1 + tanh((0.15 - r) / 0.02))"
    boundary:
      type: periodic
    sharpening: false

  - name: alpha_pm
    initial_condition: "0.5 * (1 + tanh((0.15 - r) / 0.02))"
    boundary:
      type: periodic
    sharpening: true
    sharpening_method: pm

  - name: alpha_cl
    initial_condition: "0.5 * (1 + tanh((0.15 - r) / 0.02))"
    boundary:
      type: periodic
    sharpening: true
    sharpening_method: cl

  - name: alpha_vcac
    initial_condition: "0.5 * (1 + tanh((0.15 - r) / 0.02))"
    boundary:
      type: periodic
    sharpening: true
    sharpening_method: vcac

  - name: alpha_glcls
    initial_condition: "0.5 * (1 + tanh((0.15 - r) / 0.02))"
    boundary:
      type: periodic
    sharpening: true
    sharpening_method: glcls

solver:
  type: upwind

sharpening:
  enabled: false
  method: pm
  eps_target: 0.01
  strength: 1.0
  n_substeps: 20
  method_params:
    glcls_delta: 0.1

output:
  monitors:
    - type: console

    # Overlay contour comparison
    - type: gif
      every_n_steps: 20
      compare_fields:
        - field: alpha_no_sharp
          contour_levels: [0.5]
          color: black
          linestyle: "-"
        - field: alpha_pm
          contour_levels: [0.5]
          color: red
          linestyle: "-"
        - field: alpha_cl
          contour_levels: [0.5]
          color: blue
          linestyle: "-"
        - field: alpha_vcac
          contour_levels: [0.5]
          color: darkgreen
          linestyle: "--"
        - field: alpha_glcls
          contour_levels: [0.5]
          color: darkorange
          linestyle: "--"

    # Individual GIFs
    - type: gif
      every_n_steps: 20
      field: alpha_no_sharp
    - type: gif
      every_n_steps: 20
      field: alpha_pm
    - type: gif
      every_n_steps: 20
      field: alpha_cl
    - type: gif
      every_n_steps: 20
      field: alpha_vcac
    - type: gif
      every_n_steps: 20
      field: alpha_glcls
