# 1D comparison: First-order derived methods (LPM, CFO) vs PM and CL
# LPM: derived from LCLS via PM approximations (13),(15) — localized, non-conservative
# CFO: derived from CLS equilibrium flux potential — conservative, first-order

domain:
  x_min: -0.5
  x_max: 0.5
  n_points: 100

time:
  dt: 0.01
  n_steps: 2000

velocity:
  type: constant
  value: [0.5]

fields:
  - name: alpha_no_sharp
    initial_condition: "0.5 * (tanh((0.1 + x) / 0.02) + tanh((0.1 - x) / 0.02))"
    boundary:
      type: periodic
    sharpening: false

  - name: alpha_pm
    initial_condition: "0.5 * (tanh((0.1 + x) / 0.02) + tanh((0.1 - x) / 0.02))"
    boundary:
      type: periodic
    sharpening: true
    sharpening_method: pm

  - name: alpha_cl
    initial_condition: "0.5 * (tanh((0.1 + x) / 0.02) + tanh((0.1 - x) / 0.02))"
    boundary:
      type: periodic
    sharpening: true
    sharpening_method: cl

  - name: alpha_lpm
    initial_condition: "0.5 * (tanh((0.1 + x) / 0.02) + tanh((0.1 - x) / 0.02))"
    boundary:
      type: periodic
    sharpening: true
    sharpening_method: lpm

  - name: alpha_cfo
    initial_condition: "0.5 * (tanh((0.1 + x) / 0.02) + tanh((0.1 - x) / 0.02))"
    boundary:
      type: periodic
    sharpening: true
    sharpening_method: cfo

solver:
  type: upwind

sharpening:
  enabled: false
  method: pm
  eps_target: 0.005
  strength: 1.0
  n_substeps: 10

output:
  monitors:
    - type: console

    - type: gif
      every_n_steps: 20
      compare_fields:
        - field: alpha_no_sharp
          color: black
          linestyle: "-"
        - field: alpha_pm
          color: red
          linestyle: "-"
        - field: alpha_cl
          color: blue
          linestyle: "-"
        - field: alpha_lpm
          color: darkgreen
          linestyle: "--"
        - field: alpha_cfo
          color: darkorange
          linestyle: "--"

    - type: gif
      every_n_steps: 20
      field: alpha_lpm
    - type: gif
      every_n_steps: 20
      field: alpha_cfo
    - type: gif
      every_n_steps: 20
      field: alpha_pm
